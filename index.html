<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    
    <!-- Importing Crimson Text Font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">


    <!-- External CSS -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="coming-soon-container">
        <div class="image-container">
            <!-- Background Image -->
            <img src="/img/myc5.png" alt="myclogo" class="background-image">
        </div>
        
        <!-- Main Content -->
        <div class="content">
            <h1>ReBuilding !!!!</h1>
            <p>Meanwhile, please sign up for our newsletter.</p>
            <form id="newsletterForm" class="newsletter-form" action="https://formspree.io/f/xnnqdvdn" method="POST" novalidate>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>
                <input type="hidden" name="_subject" value="New Newsletter Subscription">
                <button type="submit">Subscribe</button>
                <p id="error-message" style="color: red; display: none;">Please enter a valid email address.</p>
            </form>
            
            <script>
                document.getElementById("newsletterForm").addEventListener("submit", function(event) {
                    const emailField = document.getElementById("email");
                    const errorMessage = document.getElementById("error-message");
            
                    // Regular expression for basic email validation
                    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
                    if (!emailPattern.test(emailField.value)) {
                        event.preventDefault(); // Prevent form submission
                        errorMessage.style.display = "block"; // Show error message
                        errorMessage.textContent = "Please enter a valid email address.";
                    } else {
                        errorMessage.style.display = "none"; // Hide error message if valid
                    }
                });
            </script>
            <div id="form-success-message" style="display:none; color: green; margin-top: 10px;">
                Thank you for subscribing!
            </div>
            <!-- Social Media Icons -->
            <div class="social-icons">
                <div class="social-icons">
                    <a href="https://www.instagram.com/myctechnologies?igsh=MXJiNWN2dm1haXN6ag%3D%3D&utm_source=qr" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.facebook.com/people/Myctechnologies/61561119772758/" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                    <a href="mailto:info@myctechnologies.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
                </div>                
            </div>
        </div>
          <!-- div for the timer-->
        <h1><div class="countdown-timer" id="timer"></div></h1> 
      </div>
    </div>
    
    <script>
      // JavaScript for the countdown timer
      function updatetimer() {
        const today = new Date();
        const targetDate = new Date(today.getFullYear(), 2, 1); // March 1st
        const timeDifference = targetDate - today;
   
        if (timeDifference > 0) {
          const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
          const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);
   
          document.getElementById("timer").textContent = 
            `${days} Days, ${hours} Hours, ${minutes} Minutes, ${seconds} Seconds`;
        } else {
          document.getElementById("timer").textContent = "The day has arrived!";
        }
      }
   
      // Update the countdown every second
      setInterval(updatetimer, 1000);
      updatetimer();
  </script>
    <!-- Internal JavaScript -->
    <script src="/script.js"></script>
</body>
</html>
